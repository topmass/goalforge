<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>LoopForge</title>
    <link rel="stylesheet" href="/styles.css">
  </head>
  <body>
    <main class="shell">
      <section class="masthead">
        <div class="brand-lockup">
          <span class="brand-mark" aria-hidden="true">GF</span>
          <div>
            <div class="wordmark" aria-label="LoopForge">LoopForge</div>
            <div class="brand-subtitle">LOCAL CODEX ORCHESTRATION</div>
          </div>
        </div>
        <div class="mastline">
          <span id="connection">CONNECTING</span>
        </div>
      </section>

      <section class="toolbar" aria-label="Goal controls">
        <input
          id="goalText"
          type="text"
          autocomplete="off"
          placeholder="Queue a goal for this folder"
        >
        <button id="addGoal">ADD GOAL</button>
        <button id="startLoopforge">START READY GOALS</button>
      </section>
      <section class="settings-strip" aria-label="Model settings">
        <label>
          <span>MODEL</span>
          <select id="modelSelect">
            <option value="gpt-5.5">GPT-5.5</option>
            <option value="gpt-5.4">GPT-5.4</option>
            <option value="gpt-5.4-mini">GPT-5.4 Mini</option>
            <option value="gpt-5.3-codex">GPT-5.3 Codex</option>
            <option value="gpt-5.3-codex-spark">GPT-5.3 Codex Spark</option>
            <option value="gpt-5.2">GPT-5.2</option>
          </select>
        </label>
        <label>
          <span>REASONING</span>
          <select id="reasoningSelect">
            <option value="low">LOW</option>
            <option value="medium">MEDIUM</option>
            <option value="high">HIGH</option>
            <option value="xhigh">XHIGH</option>
          </select>
        </label>
        <label class="toggle-label">
          <input id="fastMode" type="checkbox">
          <span>FAST MODE</span>
        </label>
        <label class="toggle-label">
          <input id="githubPrReview" type="checkbox">
          <span>GITHUB PR GATE</span>
        </label>
        <label class="toggle-label">
          <input id="themeMode" type="checkbox">
          <span>DARK MODE</span>
        </label>
        <span id="settingsStatus" class="settings-status">INHERITING CODEX DEFAULTS</span>
        <span id="runtimeStatus" class="settings-status">WORKFLOW LOADING</span>
      </section>

      <section id="board" class="board" aria-label="Kanban board"></section>
      <div id="taskModal" class="modal-backdrop" hidden>
        <article class="task-modal" role="dialog" aria-modal="true" aria-label="Goal plan">
          <div id="taskModalContent"></div>
        </article>
      </div>

      <section class="command">
        <div class="panel-title">
          <span>LIVE COMMAND CENTER</span>
          <div id="selectedTask" class="selected-task">NO SELECTION</div>
        </div>
        <div id="commandCenter" class="command-grid"></div>
      </section>
    </main>
    <script src="/app.js"></script>
  </body>
</html>
